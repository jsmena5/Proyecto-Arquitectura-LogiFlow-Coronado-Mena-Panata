version: "3.8"

services:
  postgres-logiflow:
    image: postgres:16
    container_name: postgres-logiflow
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin123
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_logiflow_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

volumes:
  postgres_logiflow_data:
